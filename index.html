<script>
const firebaseConfig = {
  apiKey: "AIzaSyBKB0cuAkaxMBx9LetqUZb-mvd08sCxZs4",
  authDomain: "application-break-antillais.firebaseapp.com",
  projectId: "application-break-antillais",
  storageBucket: "application-break-antillais.firebasestorage.app",
  messagingSenderId: "788821898426",
  appId: "1:788821898426:web:0de8466a653123ea407e83"
};
firebase.initializeApp(firebaseConfig);
var _db = firebase.firestore();
_db.settings({ experimentalForceLongPolling: true, merge: true });
var _auth = firebase.auth();

_auth.onAuthStateChanged(async function(user) {
  if (user) {
    try {
      var snap = await _db.collection('users').doc(user.uid).get();
      window._currentUser = snap.exists ? {id: user.uid, ...snap.data()} : null;
    } catch(e) {
      console.warn('Auth state error:', e.message);
      window._currentUser = null;
    }
  } else {
    window._currentUser = null;
  }
  if (window.onAuthReady) window.onAuthReady(window._currentUser);
});
</script>

<style>
:root{
  --red:#E8202A;--red-dark:#B01820;--red-light:#FF4550;
  --gold:#D4AF37;--gold-light:#F0D060;
  --dark:#0a0a0a;--dark2:#141414;--dark3:#1e1e1e;--dark4:#282828;
  --text:#f5f5f5;--text-muted:#888;
  --border:rgba(232,32,42,0.2);--border2:rgba(255,255,255,0.08);
  --radius:16px;--radius-sm:10px;
  --font-head:'Syne',sans-serif;--font-body:'DM Sans',sans-serif;--font-script:'Dancing Script',cursive
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{font-size:16px}
html,body{background:#0a0a0a!important;color:var(--text);font-family:var(--font-body);min-height:100vh;overflow-x:hidden}

@keyframes fadeUp{from{transform:translateY(20px);opacity:0}to{transform:translateY(0);opacity:1}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
@keyframes shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}
@keyframes slideUp{from{transform:translateY(100%);opacity:0}to{transform:translateY(0);opacity:1}}

/* LOADING */
#loading-screen{position:fixed;inset:0;background:#000;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;overflow:hidden}
#loading-logo{width:75vw;max-width:340px;min-width:220px;display:block;animation:pulse 2s ease-in-out infinite}
#loading-spinner-wrap{position:absolute;bottom:12%;left:50%;transform:translateX(-50%)}
.spinner{width:36px;height:36px;border:3px solid rgba(232,32,42,0.2);border-top-color:var(--red);border-radius:50%;animation:spin .7s linear infinite}
.loading-text{font-size:.85rem;color:var(--text-muted);font-family:var(--font-body);letter-spacing:.1em;text-transform:uppercase}

/* SCREENS */
.screen{display:none;min-height:100vh;animation:fadeIn .3s ease;padding-bottom:80px;background:#0a0a0a}
.screen.active{display:block}

/* HEADER */
.app-header{background:var(--dark2);padding:.75rem 1.25rem;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;border-bottom:1px solid var(--border);backdrop-filter:blur(12px)}
.app-logo img{height:36px;width:auto}

/* BOTTOM NAV */
.bottom-nav{position:fixed;bottom:0;left:0;right:0;background:var(--dark2);border-top:1px solid var(--border);display:flex;z-index:200;padding-bottom:env(safe-area-inset-bottom)}
.nav-item{flex:1;display:flex;flex-direction:column;align-items:center;padding:.65rem .5rem;cursor:pointer;border:none;background:none;color:var(--text-muted);font-size:.65rem;font-family:var(--font-body);font-weight:600;gap:.25rem;transition:color .2s;position:relative;letter-spacing:.02em}
.nav-item.active{color:var(--red)}.nav-item svg{width:21px;height:21px}
.nav-badge{position:absolute;top:5px;right:calc(50% - 18px);background:var(--red);color:#fff;font-size:.58rem;font-weight:700;min-width:15px;height:15px;border-radius:8px;display:flex;align-items:center;justify-content:center;padding:0 3px}

/* BUTTONS */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:.5rem;padding:.8rem 1.5rem;border-radius:var(--radius-sm);border:none;cursor:pointer;font-family:var(--font-body);font-weight:600;font-size:.9rem;transition:all .2s;text-decoration:none}
.btn-primary{background:var(--red);color:#fff;box-shadow:0 4px 15px rgba(232,32,42,.3)}
.btn-primary:hover{background:var(--red-light);transform:translateY(-1px);box-shadow:0 6px 20px rgba(232,32,42,.4)}
.btn-secondary{background:rgba(255,255,255,.06);color:var(--text);border:1px solid var(--border2)}
.btn-secondary:hover{background:rgba(255,255,255,.1)}
.btn-danger{background:#b91c1c;color:#fff}
.btn-success{background:#166534;color:#fff}
.btn-full{width:100%}
.btn-sm{padding:.5rem 1rem;font-size:.82rem}
.btn:disabled{opacity:.45;cursor:not-allowed}

/* CARDS */
.card{background:var(--dark3);border:1px solid var(--border2);border-radius:var(--radius);padding:1.25rem}

/* FORMS */
.form-group{display:flex;flex-direction:column;gap:.4rem;margin-bottom:.9rem}
.form-label{font-size:.75rem;font-weight:700;color:var(--text-muted);letter-spacing:.08em;text-transform:uppercase}
.form-input,.form-select,.form-textarea{background:var(--dark4);border:1.5px solid var(--border2);border-radius:var(--radius-sm);padding:.75rem 1rem;color:var(--text);font-family:var(--font-body);font-size:.95rem;width:100%;transition:border-color .2s;outline:none}
.form-input:focus,.form-select:focus,.form-textarea:focus{border-color:var(--red)}
.form-input::placeholder{color:var(--text-muted)}
.form-textarea{resize:vertical;min-height:100px}
.form-select option{background:var(--dark3)}
.form-error{color:#f87171;font-size:.8rem;display:none}
.form-error.show{display:block}

/* HERO */
.hero{position:relative;overflow:hidden;padding:2.5rem 1.5rem 2rem;text-align:center}
.hero-bg{position:absolute;inset:0;background:radial-gradient(ellipse at 50% 0%,rgba(232,32,42,.12) 0%,transparent 70%)}
.hero-logo{width:160px;margin:0 auto 1rem;position:relative;filter:drop-shadow(0 4px 20px rgba(232,32,42,.3))}
.hero-subtitle{font-size:.95rem;color:var(--text-muted);position:relative;letter-spacing:.03em}
.hero-badge{display:inline-flex;align-items:center;background:rgba(232,32,42,.1);border:1px solid rgba(232,32,42,.3);border-radius:100px;padding:.3rem .85rem;font-size:.75rem;font-weight:700;color:var(--red);margin-bottom:.75rem;position:relative;letter-spacing:.03em;text-transform:uppercase}

/* PRODUCTS */
.tabs{display:flex;gap:.4rem;overflow-x:auto;padding:.75rem 1rem;scrollbar-width:none}
.tabs::-webkit-scrollbar{display:none}
.tab-btn{padding:.45rem 1rem;border:1.5px solid var(--border2);border-radius:100px;background:transparent;color:var(--text-muted);font-family:var(--font-body);font-weight:600;font-size:.8rem;cursor:pointer;white-space:nowrap;transition:all .15s;flex-shrink:0}
.tab-btn.active{background:var(--red);color:#fff;border-color:var(--red)}
.product-grid{display:grid;grid-template-columns:1fr 1fr;gap:.75rem;padding:0 1rem 1rem}
.product-card{background:var(--dark3);border:1.5px solid var(--border2);border-radius:var(--radius);overflow:hidden;cursor:pointer;transition:all .2s;position:relative}
.product-card:hover{border-color:var(--red);transform:translateY(-2px);box-shadow:0 8px 25px rgba(232,32,42,.2)}
.product-card.unavailable{opacity:.5;cursor:default}
.product-img{width:100%;height:110px;background:var(--dark4);display:flex;align-items:center;justify-content:center;font-size:2.5rem}
.product-info{padding:.75rem}
.product-name{font-weight:700;font-size:.88rem;line-height:1.3;margin-bottom:.25rem}
.product-desc{font-size:.72rem;color:var(--text-muted);margin-bottom:.4rem;line-height:1.4}
.product-price{font-family:var(--font-head);font-weight:800;color:var(--gold);font-size:1rem}
.coming-soon-badge{position:absolute;top:.5rem;right:.5rem;background:var(--red);color:#fff;font-size:.62rem;font-weight:700;padding:.2rem .5rem;border-radius:100px;text-transform:uppercase}

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:500;display:flex;align-items:flex-end;justify-content:center;animation:fadeIn .2s ease}
.modal{background:var(--dark2);border:1px solid var(--border2);border-radius:var(--radius) var(--radius) 0 0;width:100%;max-width:540px;max-height:92vh;overflow-y:auto;padding:1.5rem;animation:slideUp .3s ease}
.modal-handle{width:40px;height:4px;background:rgba(255,255,255,.15);border-radius:2px;margin:0 auto 1.25rem}
.modal-title{font-family:var(--font-head);font-size:1.35rem;font-weight:800;margin-bottom:1.25rem}

/* CHIPS */
.chips-grid{display:flex;flex-wrap:wrap;gap:.4rem;margin-bottom:.5rem}
.chip{padding:.4rem .85rem;border:1.5px solid var(--border2);border-radius:100px;font-size:.8rem;font-weight:600;cursor:pointer;transition:all .15s;background:transparent;color:var(--text)}
.chip:hover{border-color:var(--red);color:var(--red)}
.chip.selected{background:var(--red);color:#fff;border-color:var(--red)}

/* CART */
.cart-item{display:flex;align-items:flex-start;gap:1rem;padding:1rem 0;border-bottom:1px solid var(--border2)}
.cart-item-name{font-weight:700;font-size:.9rem;margin-bottom:.2rem}
.cart-item-details{font-size:.75rem;color:var(--text-muted);line-height:1.4}
.cart-item-price{font-family:var(--font-head);font-weight:800;color:var(--gold);white-space:nowrap}
.cart-empty{text-align:center;padding:3rem 1rem;color:var(--text-muted)}

/* STATUS */
.status-badge{display:inline-flex;align-items:center;gap:.4rem;padding:.28rem .75rem;border-radius:100px;font-size:.75rem;font-weight:700}

/* SLOTS */
.slot-btn{padding:.65rem;border:1.5px solid var(--border2);border-radius:var(--radius-sm);background:var(--dark3);color:var(--text);font-family:var(--font-body);font-weight:600;font-size:.88rem;cursor:pointer;transition:all .15s;text-align:center}
.slot-btn:hover:not(.full){border-color:var(--red);color:var(--red)}
.slot-btn.selected{background:var(--red);color:#fff;border-color:var(--red)}
.slot-btn.full{opacity:.3;cursor:not-allowed}

/* PAYMENT */
.payment-option{display:flex;align-items:center;gap:1rem;padding:.9rem;border:2px solid var(--border2);border-radius:var(--radius);cursor:pointer;transition:all .15s;margin-bottom:.6rem}
.payment-option:hover{border-color:var(--red)}
.payment-option.selected{border-color:var(--red);background:rgba(232,32,42,.08)}

/* PROFILE */
.points-card{background:linear-gradient(135deg,#1a0505 0%,#2d0808 50%,#1a0505 100%);border:1px solid rgba(232,32,42,.3);border-radius:var(--radius);padding:1.5rem;position:relative;overflow:hidden}
.points-card::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 30% 50%,rgba(232,32,42,.15),transparent 60%)}
.points-value{font-family:var(--font-head);font-size:3rem;font-weight:800;color:var(--red);line-height:1;position:relative}
.avatar{width:42px;height:42px;border-radius:50%;background:linear-gradient(135deg,var(--red),var(--red-dark));display:flex;align-items:center;justify-content:center;font-family:var(--font-head);font-weight:800;font-size:1rem;color:#fff;flex-shrink:0}

/* PROMO */
.promo-card{background:linear-gradient(135deg,#1a0505,#2d0808);border:1px solid rgba(232,32,42,.3);border-radius:var(--radius);padding:1.25rem;margin-bottom:.75rem}
.badge-new{background:var(--red);color:#fff;font-size:.65rem;font-weight:700;padding:.2rem .6rem;border-radius:100px;display:inline-block;margin-bottom:.5rem;text-transform:uppercase}

/* ADMIN */
.admin-nav{display:flex;flex-wrap:wrap;gap:.5rem;padding:1rem}
.admin-nav-btn{flex:1;min-width:90px;padding:.7rem .5rem;background:var(--dark3);border:1px solid var(--border2);border-radius:var(--radius-sm);color:var(--text-muted);font-family:var(--font-body);font-weight:600;font-size:.75rem;cursor:pointer;text-align:center;transition:all .15s}
.admin-nav-btn:hover,.admin-nav-btn.active{border-color:var(--red);color:var(--red);background:rgba(232,32,42,.08)}
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:.75rem;padding:0 1rem}
.stat-card{background:var(--dark3);border:1px solid var(--border2);border-radius:var(--radius);padding:1rem;text-align:center}
.stat-value{font-family:var(--font-head);font-size:1.6rem;font-weight:800;color:var(--red)}
.stat-label{font-size:.72rem;color:var(--text-muted);margin-top:.2rem}

/* SECTION TITLE */
.section-title{font-family:var(--font-head);font-size:1.1rem;font-weight:800;margin-bottom:1rem;display:flex;align-items:center;gap:.5rem;text-transform:uppercase;letter-spacing:.03em}
.section-title::after{content:'';flex:1;height:1px;background:var(--border2)}

/* UTILS */
.divider{height:1px;background:var(--border2);margin:1.25rem 0}
.text-red{color:var(--red)}.text-gold{color:var(--gold)}.text-muted{color:var(--text-muted)}
.text-center{text-align:center}.text-sm{font-size:.82rem}.font-head{font-family:var(--font-head)}
.fw-700{font-weight:700}.fw-800{font-weight:800}
.mt-1{margin-top:.5rem}.mt-2{margin-top:1rem}.mt-3{margin-top:1.5rem}
.mb-1{margin-bottom:.5rem}.mb-2{margin-bottom:1rem}.mb-3{margin-bottom:1.5rem}
.hidden{display:none!important}.w-full{width:100%}
::-webkit-scrollbar{width:3px}::-webkit-scrollbar-track{background:var(--dark)}::-webkit-scrollbar-thumb{background:var(--red);border-radius:2px}
@media(max-width:375px){.product-grid{grid-template-columns:1fr}}
</style>
</head>

function fmt(p){return typeof p==='number'?p.toFixed(2).replace('.',',')+'\u20ac':p;}
function genId(){return Date.now().toString(36)+Math.random().toString(36).substr(2);}

function getCurrentUser(){
  return window._currentUser || null;
}

async function fbSaveDoc(collection, id, data) {
  await _db.collection(collection).doc(id).set(data, {merge: true});
}

async function fbGetDoc(col, id) {
  for (var attempt = 0; attempt < 3; attempt++) {
    try {
      var snap = await _db.collection(col).doc(id).get();
      return snap.exists ? {id: snap.id, ...snap.data()} : null;
    } catch(e) {
      console.warn('fbGetDoc attempt', attempt, e.message);
      if (attempt < 2) await new Promise(function(r){setTimeout(r, 1500);});
      else return null;
    }
  }
  return null;
}

async function fbGetCollection(col) {
  for (var attempt = 0; attempt < 3; attempt++) {
    try {
      var snap = await _db.collection(col).get();
      var results = [];
      snap.forEach(function(d){results.push({id: d.id, ...d.data()});});
      return results;
    } catch(e) {
      console.warn('fbGetCollection attempt', attempt, e.message);
      if (attempt < 2) await new Promise(function(r){setTimeout(r, 1500);});
      else return [];
    }
  }
  return [];
}

async function getCfg() {
  if (_cfg) return _cfg;
  var saved = await fbGetDoc('config', 'main');
  _cfg = saved || DEFAULT_CFG;
  return _cfg;
}

async function getProducts() {
  if (_products) return _products;
  var saved = await fbGetCollection('products');
  if (saved.length > 0) {
    _products = saved;
  } else {
    // First run: seed products
    _products = DEFAULT_PRODUCTS;
    for (var p of DEFAULT_PRODUCTS) {
      await fbSaveDoc('products', p.id, p);
    }
  }
  return _products;
}

async function saveOrder(order) {
  await fbSaveDoc('orders', order.id, order);
  window.dispatchEvent(new CustomEvent('orderUpdated', {detail: order}));
}

async function saveUser(user) {
  await fbSaveDoc('users', user.id, user);
  if (getCurrentUser() && getCurrentUser().id === user.id) {
    window._currentUser = user;
  }
}

// Subscribe to orders in real-time
function subscribeOrders(callback) {
  if (_unsubOrders) _unsubOrders();
  _unsubOrders = _db.collection('orders')
    .orderBy('createdAt', 'desc')
    .onSnapshot(function(snap) {
      _orders = [];
      snap.forEach(function(d){_orders.push({id: d.id, ...d.data()});});
      if (callback) callback(_orders);
    }, function(err){ console.warn('subscribeOrders error:', err.message); });
}

function subscribeConfig(callback) {
  if (_unsubCfg) _unsubCfg();
  _unsubCfg = _db.collection('config').doc('main')
    .onSnapshot(function(snap) {
      if (snap.exists) {
        _cfg = snap.data();
        if (callback) callback(_cfg);
      }
    }, function(err){ console.warn('subscribeConfig error:', err.message); });
}

function toast(msg, type, dur) {
  var wrap = document.getElementById('toast-wrap');
  if (!wrap) return;
  var el = document.createElement('div');
  var colors = {success:'#10b981',error:'#ef4444',info:'#3b82f6',warning:'#f59e0b'};
  el.style.cssText = 'background:'+(colors[type]||colors.info)+';color:#fff;padding:.75rem 1.25rem;border-radius:12px;font-family:inherit;font-size:.9rem;font-weight:600;box-shadow:0 4px 20px rgba(0,0,0,.4);animation:slideIn .3s ease;pointer-events:auto;';
  el.textContent = msg;
  wrap.appendChild(el);
  setTimeout(function(){el.style.animation='slideOut .3s ease';setTimeout(function(){if(el.parentNode)el.remove();},300);},(dur||3500));
}

async function loadUserPromos(userId) {
  var banner = document.getElementById('promo-banner');
  if (!banner) return;
  try {
    var snap = await _db.collection('promos')
      .where('userId', '==', userId)
      .get();
    var promos = [];
    snap.forEach(function(d){ promos.push({id:d.id,...d.data()}); });
    var active = promos.filter(function(p){ return !p.used && new Date(p.expiresAt) > new Date(); });
    if (active.length === 0) {
      banner.innerHTML = '<div style="color:var(--text-muted);font-size:.82rem;text-align:center;padding:.25rem 0">Aucune offre en cours — restez connecté !</div>';
      return;

        + '<span style="font-size:1.8rem">' + (p.type==='birthday'?'🎂':'🎁') + '</span>'
        + '<div style="flex:1"><div style="font-weight:700;font-size:.88rem">' + p.title + '</div>'

  }

    nb.textContent = unread; nb.style.display = unread > 0 ? 'flex' : 'none';
  } else if (nb) { nb.style.display = 'none'; }

async function notify(userId, title, body) {
  var userData = await fbGetDoc('users', userId);
  if (!userData) return;
  if (!userData.notifications) userData.notifications = [];
  userData.notifications.unshift({id:genId(),title,body,read:false,at:new Date().toISOString()});
  if (userData.notifications.length > 50) userData.notifications = userData.notifications.slice(0, 50);
  await saveUser(userData);
  var cur = getCurrentUser();
  if (cur && cur.id === userId) {
    window._currentUser = userData;
    toast(title + ': ' + body, 'info', 5000);
    updateNavBadges();
  }
}

async function doLogin() {
  var email = document.getElementById('li-email').value.trim().toLowerCase();
  var pwd = document.getElementById('li-pwd').value;
  var err = document.getElementById('li-err');
  if (!email || !pwd) { if(err){err.textContent='Champs requis';err.classList.add('show');} return; }
  try {
    var cred = await _auth.signInWithEmailAndPassword(email, pwd);
    var userData = await fbGetDoc('users', cred.user.uid);
    if (!userData) { if(err){err.textContent='Compte introuvable en base';err.classList.add('show');} return; }
    window._currentUser = userData;
    closeModal('modal-auth');
    updateHeaderAuth();
    updateNavBadges();
    renderHomeScreen();
    toast('Bienvenue ' + userData.prenom + ' ! 🌴', 'success');
  } catch(e) {
    console.error('Login error:', e.code, e.message);
    var msg = 'Email ou mot de passe incorrect';
    if (e.code === 'auth/network-request-failed') msg = 'Erreur reseau';
    if (e.code === 'auth/too-many-requests') msg = 'Trop de tentatives, attendez';
    if (e.code === 'auth/user-not-found') msg = 'Aucun compte avec cet email';
    if (e.code === 'auth/wrong-password') msg = 'Mot de passe incorrect';
    if (err) { err.textContent = msg + ' [' + (e.code||'erreur') + ']'; err.classList.add('show'); }
  }
}

async function doRegister() {
  var prenom = document.getElementById('rg-prenom').value.trim();
  var phone = document.getElementById('rg-phone').value.trim().replace(/\s/g,'');
  var email = document.getElementById('rg-email').value.trim().toLowerCase();
  var pwd = document.getElementById('rg-pwd').value;
  var pwd2 = document.getElementById('rg-pwd2').value;
  var bday = document.getElementById('rg-bday').value;
  var cgv = document.getElementById('rg-cgv').checked;
  document.querySelectorAll('.form-error').forEach(function(e){e.textContent='';e.classList.remove('show');});
  var ok = true;
  function setErr(id,msg){var el=document.getElementById(id);if(el){el.textContent=msg;el.classList.add('show');}ok=false;}
  if (!prenom) setErr('rg-prenom-err','Prenom requis');
  if (!phone || phone.length < 10) setErr('rg-phone-err','Telephone invalide');
  if (!email || email.indexOf('@') < 0) setErr('rg-email-err','Email invalide');
  if (!pwd || pwd.length < 6) setErr('rg-pwd-err','Min. 6 caracteres');
  if (pwd !== pwd2) setErr('rg-pwd2-err','Mots de passe differents');
  if (!cgv) setErr('rg-cgv-err','Acceptez les CGV');
  if (!ok) return;
  try {
    var cfg = await getCfg();
    var cred = await _auth.createUserWithEmailAndPassword(email, pwd);
    var newUser = {
      id: cred.user.uid, role: 'client', prenom, phone, email,
      birthday: bday || null, points: cfg.signupBonusPoints || 50,
      notifications: [], createdAt: new Date().toISOString()
    };
    await fbSaveDoc('users', cred.user.uid, newUser);
    window._currentUser = newUser;
    closeModal('modal-auth');
    updateHeaderAuth();
    updateNavBadges();
    renderHomeScreen();
    toast('Compte cree ! Bienvenue ' + prenom + ' 🌴', 'success');
  } catch(e) {
    if (e.code === 'auth/email-already-in-use') {
      showErr('rg-email-err', 'Email deja utilise');
    } else {
      toast('Erreur: ' + e.message, 'error');
    }
  }
}

function filterCat(cat, btn) {
  document.querySelectorAll('.tab-btn').forEach(function(b){b.classList.remove('active');});
  btn.classList.add('active');
  var grid = document.getElementById('product-grid');
  if (!grid) return;
  var prods = (_products||[]).filter(function(p){return p.category === cat;});
  grid.innerHTML = prods.map(productCardHTML).join('');
}

function productCardHTML(p) {
  var clickable = p.available && !p.comingSoon;
  var div = document.createElement('div');
  div.className = 'product-card' + (clickable ? '' : ' unavailable');
  if (clickable) { div.style.cursor='pointer'; div.dataset.pid = p.id; div.setAttribute('onclick','openProduct(this.dataset.pid)'); }
  var img = p.image
    ? '<img src="'+p.image+'" alt="'+p.name+'" style="width:100%;height:110px;object-fit:cover;display:block">'
    : '<div class="product-img">' + (CAT_EMOJI[p.category]||'🍽') + '</div>';
  div.innerHTML = img
    + (p.comingSoon ? '<span class="coming-soon-badge" style="position:absolute;top:.5rem;right:.5rem">Bientot</span>' : '')
    + '<div class="product-info"><div class="product-name">'+p.name+'</div>'
    + '<div class="product-desc">'+(p.description||'')+'</div>'
    + '<div class="product-price">'+fmt(p.price)+'</div></div>';
  return div.outerHTML;
}

// PRODUCT CONFIGURATOR
// ═══════════════════════════════════════════
var pendingProd = null;
var pendingExtras = {sauces:[], crudites:[], meats:[]};

function openProduct(id) {
  var user = getCurrentUser();
  if (!user) { toast('Connectez-vous pour commander','warning'); showLogin(); return; }
  var prods = _products || [];
  var p = prods.find(function(x){return x.id === id;});
  if (!p) return;
  getCfg().then(function(cfg) {
    var now = new Date();
    var cp = cfg.orderCutoffTime.split(':');
    var cutoff = new Date(); cutoff.setHours(parseInt(cp[0]),parseInt(cp[1]),0,0);
    if (now >= cutoff) { toast('Commandes fermees apres ' + cfg.orderCutoffTime,'warning'); return; }
    pendingProd = p;
    pendingExtras = {sauces:[], crudites:[], meats:[]};
    var meatCount = getMeatCount(p);
    var needsConfig = ['bokit','crepe_salee','agoulou'].indexOf(p.category) >= 0;
    var html = '<div class="modal-overlay" onclick="if(event.target===this)closeModal(\'modal-product\')">'
      + '<div class="modal"><div class="modal-handle"></div>'
      + '<div style="font-size:2.5rem;text-align:center;margin-bottom:.5rem">' + (CAT_EMOJI[p.category]||'🍽') + '</div>'
      + '<h2 class="modal-title text-center">' + p.name + '</h2>'
      + '<p class="text-center text-muted text-sm mb-2">' + (p.description||'') + '</p>'
      + '<div class="text-center mb-3" style="font-family:var(--font-head);font-size:1.4rem;font-weight:800;color:var(--gold)">' + fmt(p.price) + '</div>';
    if (needsConfig) {
      if (meatCount > 0) {
        html += '<div class="form-group"><label class="form-label">🥩 ' + (meatCount > 1 ? meatCount + ' viandes' : 'Viande') + ' au choix</label><div class="chips-grid" id="meat-chips">';
        MEATS.forEach(function(m){ html += '<button class="chip" data-val="'+m+'" onclick="toggleMeat(this,'+meatCount+')">'+m+'</button>'; });
        html += '</div></div>';
      }
      html += '<div class="form-group"><label class="form-label">🥫 Sauce</label><div class="chips-grid" id="sauce-chips">';
      SAUCES.forEach(function(s){ html += '<button class="chip" data-val="'+s+'" onclick="toggleSauce(this)">'+s+'</button>'; });
      html += '</div></div>';
      html += '<div class="form-group"><label class="form-label">🥗 Crudites</label><div class="chips-grid" id="crud-chips">';
      CRUDITES.forEach(function(c){ html += '<button class="chip" data-val="'+c+'" onclick="toggleCrudite(this)">'+c+'</button>'; });
      html += '</div></div>';
    }
    html += '<button class="btn btn-primary btn-full mt-2" onclick="addToCart()">➕ Ajouter au panier</button></div></div>';
    var modal = document.getElementById('modal-product');
    modal.innerHTML = html; modal.style.display = 'block';
  });
}

function getMeatCount(p) {
  var n = p.name.toLowerCase();
  if (n.indexOf('4 viande') >= 0) return 4;
  if (n.indexOf('3 viande') >= 0) return 3;
  if (n.indexOf('2 viande') >= 0) return 2;
  if (n.indexOf('1 viande') >= 0) return 1;
  return 0;
}
function toggleMeat(btn, max) {
  var m = btn.dataset.val;
  var idx = pendingExtras.meats.indexOf(m);
  if (idx >= 0) { pendingExtras.meats.splice(idx,1); btn.classList.remove('selected'); }
  else if (pendingExtras.meats.length < max) { pendingExtras.meats.push(m); btn.classList.add('selected'); }
  else { toast('Maximum ' + max + ' viande(s)','warning'); }
}
function toggleSauce(btn) {
  document.querySelectorAll('#sauce-chips .chip').forEach(function(c){c.classList.remove('selected');});
  pendingExtras.sauces = [btn.dataset.val];
  btn.classList.add('selected');
}
function toggleCrudite(btn) {
  var c = btn.dataset.val;
  var isFull = c === 'Sans crudites' || c === 'Tout (salade+tomate+oignon)';
  if (isFull) {
    document.querySelectorAll('#crud-chips .chip').forEach(function(x){x.classList.remove('selected');});
    pendingExtras.crudites = [c]; btn.classList.add('selected');
  } else {
    ['Sans crudites','Tout (salade+tomate+oignon)'].forEach(function(o){
      var ob = Array.from(document.querySelectorAll('#crud-chips .chip')).find(function(x){return x.dataset.val===o;});
      if (ob && ob.classList.contains('selected')) { ob.classList.remove('selected'); pendingExtras.crudites = []; }
    });
    var idx = pendingExtras.crudites.indexOf(c);
    if (idx >= 0) { pendingExtras.crudites.splice(idx,1); btn.classList.remove('selected'); }
    else { pendingExtras.crudites.push(c); btn.classList.add('selected'); }
  }
}

function addToCart() {
  if (!pendingProd) return;
  var meatCount = getMeatCount(pendingProd);
  if (meatCount > 0 && pendingExtras.meats.length < meatCount) { toast('Choisissez ' + meatCount + ' viande(s)','warning'); return; }
  var details = [];
  if (pendingExtras.meats.length) details.push('Viandes: ' + pendingExtras.meats.join(', '));
  if (pendingExtras.sauces.length) details.push('Sauce: ' + pendingExtras.sauces.join(', '));
  if (pendingExtras.crudites.length) details.push('Crudites: ' + pendingExtras.crudites.join(', '));
  cart.push({id:genId(),productId:pendingProd.id,name:pendingProd.name,price:pendingProd.price,category:pendingProd.category,details:details.join(' | '),qty:1});
  closeModal('modal-product'); updateNavBadges();
  toast(pendingProd.name + ' ajoute !','success');
  setTimeout(function(){ showUpsell(pendingProd); }, 600);
}

function showUpsell(product) {
  if (['bokit','crepe_salee','agoulou'].indexOf(product.category) < 0) return;
  var prods = (_products||[]).filter(function(p){return p.available && !p.comingSoon;});
  var sweets = prods.filter(function(p){return p.category==='crepe_sucree';});
  var drinks = prods.filter(function(p){return p.category==='boisson';});
  var suggestions = [];
  if (sweets.length) suggestions.push(sweets[Math.floor(Math.random()*sweets.length)]);
  if (drinks.length) suggestions.push(drinks[Math.floor(Math.random()*drinks.length)]);
  if (!suggestions.length) return;
  var html = '<div class="modal-overlay" onclick="if(event.target===this)closeModal(\'modal-product\')">'
    + '<div class="modal"><div class="modal-handle"></div><h2 class="modal-title">On vous propose aussi 🤤</h2>'
    + '<div style="display:flex;flex-direction:column;gap:.75rem">';
  suggestions.forEach(function(s) {
    html += '<div style="display:flex;align-items:center;gap:1rem;padding:.75rem;background:var(--dark3);border-radius:var(--radius-sm);border:1px solid var(--border)">'
      + '<div style="font-size:2rem">' + (CAT_EMOJI[s.category]||'🍽') + '</div>'
      + '<div style="flex:1"><div style="font-weight:600">'+s.name+'</div><div style="color:var(--gold);font-family:var(--font-head);font-weight:700">'+fmt(s.price)+'</div></div>'
      + '<button class="btn btn-primary btn-sm" data-sid="'+s.id+'" onclick="quickAdd(this.dataset.sid)">+</button></div>';
  });
  html += '</div><button class="btn btn-secondary btn-full mt-2" onclick="closeModal(\'modal-product\')">Non merci</button></div></div>';
  var modal = document.getElementById('modal-product');
  modal.innerHTML = html; modal.style.display = 'block';
}

function quickAdd(id) {
  var p = (_products||[]).find(function(x){return x.id===id;});
  if (!p) return;
  cart.push({id:genId(),productId:p.id,name:p.name,price:p.price,category:p.category,details:'',qty:1});
  closeModal('modal-product'); updateNavBadges();
  toast(p.name + ' ajoute !','success');
}

async function showCheckout() {
  var today = new Date().toISOString().split('T')[0];

  var slots = getSlots(today, cfg);

  slots.forEach(function(s) {
    html += '<button class="slot-btn' + (!s.available ? ' full' : '') + '"'
      + (s.available ? ' data-time="'+s.time+'" onclick="selectSlot(this)"' : ' disabled') + '>' + s.time + '</button>';
  });
  html += '</div><div id="slot-info" class="text-center text-muted text-sm mt-1 mb-2"></div>'
    + '<div style="height:1px;background:var(--border);margin:1.25rem 0"></div>'

    + '<div class="payment-option" id="pay-cash" onclick="selectPayment(\'cash\')">'
    + '<span style="font-size:1.8rem">💵</span><div><div class="fw-700">Especes</div><div class="text-sm text-muted">Paiement au retrait</div></div></div>'
    + '<div style="display:flex;justify-content:space-between;padding:1rem 0;font-family:var(--font-head);font-weight:700">'
    + '<span>Total</span><span style="color:var(--gold)">' + fmt(total) + '</span></div>'
    + '<button class="btn btn-primary btn-full" id="confirm-btn" onclick="confirmOrder()" disabled>Valider la commande</button>'
    + '<button class="btn btn-secondary btn-full mt-1" onclick="closeModal(\'modal-product\')">Annuler</button></div></div>';
  var modal = document.getElementById('modal-product');
  modal.innerHTML = html; modal.style.display = 'block';
  window._slot = null; window._payment = null;
}

function getSlots(date, cfg) {
  var slots = [];
  var sp = cfg.pickupStart.split(':'), ep = cfg.pickupEnd.split(':');
  var sh = parseInt(sp[0]), sm = parseInt(sp[1]);
  var eh = parseInt(ep[0]), em = parseInt(ep[1]);
  var overrides = JSON.parse(localStorage.getItem('ba_slots')||'{}');
  var dayOrders = _orders.filter(function(o){return o.pickupDate===date && o.status!=='cancelled';});
  while (sh*60+sm < eh*60+em) {
    var key = (sh<10?'0':'')+sh+':'+(sm<10?'0':'')+sm;
    var oKey = date + '_' + key;
    var maxSlot = overrides[oKey] !== undefined ? overrides[oKey] : cfg.maxOrdersPerSlot;
    var count = dayOrders.filter(function(o){return o.pickupTime===key;}).length;
    slots.push({time:key, max:maxSlot, count:count, available:count<maxSlot});
    sm += 30; if (sm >= 60) { sh++; sm -= 60; }
  }
  return slots;
}

function selectSlot(btn) {
  document.querySelectorAll('.slot-btn').forEach(function(b){b.classList.remove('selected');});
  btn.classList.add('selected');
  window._slot = btn.dataset.time;
  var info = document.getElementById('slot-info');
  if (info) info.textContent = 'Creneau selectionne : ' + window._slot;
  checkConfirmReady();
}
function selectPayment(m) {
  document.querySelectorAll('.payment-option').forEach(function(b){b.classList.remove('selected');});
  document.getElementById('pay-' + m).classList.add('selected');
  window._payment = m;
  checkConfirmReady();
}
function checkConfirmReady() {
  var btn = document.getElementById('confirm-btn');
  if (btn) btn.disabled = !(window._slot && window._payment);
}

async function confirmOrder() {
  var user = getCurrentUser();
  if (!user || !window._slot || !window._payment) return;
  var today = new Date().toISOString().split('T')[0];
  var total = cart.reduce(function(s,i){return s+i.price*i.qty;},0);
  var cfg = await getCfg();
  var orderId = genId();
  var orderNum = String(_orders.length + 1).padStart(4,'0');
  var order = {
    id: orderId, orderNumber: orderNum,
    userId: user.id, userPrenom: user.prenom, userPhone: user.phone,
    items: cart.slice(), total, pickupDate: today, pickupTime: window._slot,
    payment: window._payment === 'card' ? 'Carte bancaire' : 'Especes',
    status: 'pending',
    statusHistory: [{status:'pending', at:new Date().toISOString()}],
    createdAt: new Date().toISOString(), pointsAwarded: false
  };
  await saveOrder(order);
  cart = []; closeModal('modal-product'); updateNavBadges();
  // Auto-confirm after 2s
  setTimeout(async function() {
    order.status = 'confirmed';
    order.statusHistory.push({status:'confirmed', at:new Date().toISOString()});
    await saveOrder(order);
    await notify(user.id, '✅ Commande validee !', 'Votre commande n°' + orderNum + ' est confirmee. Retrait a ' + order.pickupTime + '.');
  }, 2000);
  showOrderConfirmation(order, cfg);
}

async function showOrderConfirmation(order, cfg) {
  if (!cfg) cfg = await getCfg();
  var pts = Math.floor(order.total) * (cfg.pointsPerEuro||10);
  var itemsText = order.items.map(function(i){return '- ' + i.name + (i.details?' ('+i.details+')':'') + ' : ' + fmt(i.price);}).join('\n');
  var summary = cfg.orderConfirmMessage
    .replace('{prenom}', order.userPrenom)
    .replace('{orderNumber}', order.orderNumber)
    .replace('{items}', itemsText)
    .replace('{total}', fmt(order.total))
    .replace('{pickupTime}', order.pickupTime)
    .replace('{address}', cfg.pickupAddress)
    .replace('{payment}', order.payment);
  var html = '<div class="modal-overlay"><div class="modal">'
    + '<div style="text-align:center;font-size:3rem;margin-bottom:.5rem">🎉</div>'
    + '<h2 class="modal-title text-center">Commande confirmee !</h2>'
    + '<div class="card mb-2" style="background:rgba(16,185,129,.08);border-color:rgba(16,185,129,.3)">'
    + '<div class="fw-700 mb-1">Commande n°' + order.orderNumber + '</div>'
    + '<div class="text-sm">' + order.items.map(function(i){return i.name;}).join(', ') + '</div>'
    + '<div style="height:1px;background:var(--border);margin:.75rem 0"></div>'
    + '<div style="display:flex;justify-content:space-between"><span class="text-muted text-sm">Retrait</span><span class="fw-700">'+order.pickupTime+'</span></div>'
    + '<div style="display:flex;justify-content:space-between;margin-top:.25rem"><span class="text-muted text-sm">Total</span><span class="fw-700 text-gold">'+fmt(order.total)+'</span></div>'
    + '<div style="display:flex;justify-content:space-between;margin-top:.25rem"><span class="text-muted text-sm">Reglement</span><span class="fw-700">'+order.payment+'</span></div>'
    + '</div><div class="card mb-2" style="background:rgba(26,107,60,.1);border-color:rgba(26,107,60,.3)">'
    + '<div class="text-sm" style="color:#2d9e5f">🎁 <strong>+' + pts + ' points</strong> seront ajoutes lors du retrait</div></div>'
    + '<details class="mb-2"><summary class="text-sm text-muted" style="cursor:pointer;margin-bottom:.5rem">📩 Message de confirmation</summary>'
    + '<pre style="white-space:pre-wrap;font-size:.78rem;font-family:var(--font-body);color:var(--text-muted);background:var(--dark3);padding:.75rem;border-radius:8px">'+summary+'</pre></details>'
    + '<button class="btn btn-primary btn-full" onclick="closeModal(\'modal-product\');navTo(\'orders\')">Suivre ma commande</button>'
    + '</div></div>';
  var modal = document.getElementById('modal-product');
  modal.innerHTML = html; modal.style.display = 'block';
}

      + '<div class="font-head fw-800" style="font-size:1.3rem;margin-bottom:.5rem">Mes commandes</div>'
      + '<p class="text-muted text-sm mb-3">Connectez-vous pour voir vos commandes</p>'
      + '<button class="btn btn-primary" onclick="showLogin()">Se connecter</button></div>';
    return;
  }
  var orders = _orders.filter(function(o){return o.userId===user.id;});
  var html = header + '<div style="padding:1rem 1rem 6rem">';
  var active = orders.filter(function(o){return ['pending','confirmed','preparing','ready'].indexOf(o.status)>=0;});
  var done = orders.filter(function(o){return o.status==='picked_up'||o.status==='cancelled';});
  if (active.length > 0) {
    html += '<div class="section-title">En cours (' + active.length + ')</div>';
    active.forEach(function(o){ html += orderCardHTML(o); });
  }
  if (done.length > 0) {
    html += '<div class="section-title" style="margin-top:1.5rem">Historique</div>';
    done.forEach(function(o){ html += orderCardHTML(o); });

      + '<div style="font-size:3rem;margin-bottom:.75rem">&#128239;</div>'

function orderCardHTML(o) {
  var st = STATUS_INFO[o.status] || STATUS_INFO.pending;
  var steps = ['confirmed','preparing','ready','picked_up'];
  var stepLabels = {confirmed:'Validee',preparing:'En prep.',ready:'Prete',picked_up:'Recuperee'};
  var curIdx = steps.indexOf(o.status);
  var html = '<div class="card mb-2">'
    + '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:.75rem">'
    + '<span class="fw-700 font-head">N°'+o.orderNumber+'</span>'
    + '<span class="status-badge" style="background:'+st.color+'22;color:'+st.color+'">'+st.icon+' '+st.label+'</span></div>'
    + '<div class="text-sm text-muted mb-1">'+new Date(o.createdAt).toLocaleDateString('fr-FR',{day:'numeric',month:'long',hour:'2-digit',minute:'2-digit'})+'</div>'
    + '<div class="text-sm mb-1">'+o.items.map(function(i){return i.name;}).join(', ')+'</div>'
    + '<div class="text-sm fw-700 text-gold">'+fmt(o.total)+' · '+o.payment+'</div>'
    + '<div class="text-sm mt-1">⏰ Retrait a '+o.pickupTime+'</div>';
  if (curIdx >= 0) {
    html += '<div style="height:1px;background:var(--border);margin:.75rem 0"></div><div style="display:flex;overflow-x:auto;padding:.25rem 0">';
    steps.forEach(function(s,i){
      html += '<div style="flex:1;text-align:center;min-width:65px">'
        + '<div style="width:26px;height:26px;border-radius:50%;background:'+(i<=curIdx?'var(--green)':'var(--dark4)')+';border:2px solid '+(i<=curIdx?'var(--green)':'var(--border)')+';margin:0 auto;display:flex;align-items:center;justify-content:center;font-size:.75rem">'
        + (i<=curIdx?'✓':'') + '</div>'
        + '<div style="font-size:.62rem;color:'+(i<=curIdx?'var(--text)':'var(--text-muted)')+';margin-top:.25rem;line-height:1.2">'+stepLabels[s]+'</div></div>';
    });
    html += '</div>';
  }
  if (o.pointsAwarded) html += '<div class="text-sm mt-1" style="color:#2d9e5f">✅ Points ajoutes</div>';
  html += '</div>';
  return html;
}

  btn.classList.add('active');
  var fns = {orders:adminOrders,products:adminProductsRender,stats:adminStats,fidelity:adminFidelity,config:adminConfigRender,invoices:adminInvoices};
  var fn = fns[tab];

    var result = fn();
    if (result && typeof result.then === 'function') {
      result.then(function(html){document.getElementById('admin-tab-content').innerHTML=html;});

function adminOrders() {
  if (!_orders.length) return '<div class="text-center text-muted" style="padding:3rem">Aucune commande</div>';
  var nextMap = {pending:'confirmed',confirmed:'preparing',preparing:'ready',ready:'picked_up'};
  var nextLabels = {confirmed:'✅ Valider',preparing:'👨‍🍳 En preparation',ready:'🎉 Prete',picked_up:'✅ Recuperee'};
  var html = '<div style="padding:0 1rem"><h3 class="section-title mt-2">Commandes ('+_orders.length+')</h3>';
  _orders.forEach(function(o) {
    var st = STATUS_INFO[o.status] || STATUS_INFO.pending;
    var next = nextMap[o.status];
    html += '<div class="card mb-2">'
      + '<div style="display:flex;justify-content:space-between;align-items:center">'
      + '<span class="fw-700 font-head">N°'+o.orderNumber+'</span>'
      + '<span class="status-badge" style="background:'+st.color+'22;color:'+st.color+'">'+st.icon+' '+st.label+'</span></div>'
      + '<div class="text-sm text-muted mt-1">'+new Date(o.createdAt).toLocaleString('fr-FR')+'</div>'
      + '<div class="fw-700 mt-1">'+o.userPrenom+' — '+o.userPhone+'</div>'
      + '<div class="text-sm mt-1">'+o.items.map(function(i){return i.name+(i.details?' ('+i.details+')':'');}).join(' · ')+'</div>'
      + '<div style="display:flex;justify-content:space-between;margin-top:.5rem">'
      + '<span class="text-gold fw-700">'+fmt(o.total)+'</span>'
      + '<span class="text-sm text-muted">⏰ '+o.pickupTime+' · '+o.payment+'</span></div>';
    if (next) {
      html += '<button class="btn btn-primary btn-sm btn-full mt-2" data-oid="'+o.id+'" onclick="advanceOrder(this.dataset.oid)">Passer a : '+nextLabels[next]+'</button>';
    }
    if (o.status === 'pending') {
      html += '<button class="btn btn-danger btn-sm btn-full mt-1" data-oid="'+o.id+'" onclick="cancelOrder(this.dataset.oid)">Annuler</button>';
    }
    html += '</div>';
  });
  return html + '</div>';
}

async function advanceOrder(id) {
  var o = _orders.find(function(x){return x.id===id;});
  if (!o) return;
  var nextMap = {pending:'confirmed',confirmed:'preparing',preparing:'ready',ready:'picked_up'};
  var next = nextMap[o.status];
  if (!next) return;
  o = Object.assign({}, o);
  o.status = next;
  if (!o.statusHistory) o.statusHistory = [];
  o.statusHistory.push({status:next, at:new Date().toISOString()});
  if (next === 'picked_up' && !o.pointsAwarded) {
    var userData = await fbGetDoc('users', o.userId);
    if (userData) {
      var cfg = await getCfg();
      var pts = Math.floor(o.total) * (cfg.pointsPerEuro||10);
      userData.points = (userData.points||0) + pts;
      await saveUser(userData);
      o.pointsAwarded = true;
      await notify(o.userId, '🎁 Points ajoutes !', '+'+pts+' points pour votre commande n°'+o.orderNumber);
    }
  }
  await saveOrder(o);
  var titleMap = {confirmed:'✅ Validee',preparing:'👨‍🍳 En preparation',ready:'🎉 Prete !',picked_up:'✅ Recuperee'};
  var bodyMap = {
    confirmed:'Votre commande n°'+o.orderNumber+' est confirmee. Retrait a '+o.pickupTime+'.',
    preparing:'Votre commande n°'+o.orderNumber+' est en cours de preparation.',
    ready:'Votre commande n°'+o.orderNumber+' est prete ! Venez la recuperer.',
    picked_up:'Commande n°'+o.orderNumber+' recuperee. Merci ! 🌴'
  };
  await notify(o.userId, titleMap[next], bodyMap[next]);
  toast('Statut mis a jour','success');
  document.getElementById('admin-tab-content').innerHTML = adminOrders();
}

async function cancelOrder(id) {
  if (!confirm('Annuler cette commande ?')) return;
  var o = _orders.find(function(x){return x.id===id;});
  if (!o) return;
  o = Object.assign({}, o);
  o.status = 'cancelled';
  if (!o.statusHistory) o.statusHistory = [];
  o.statusHistory.push({status:'cancelled', at:new Date().toISOString()});
  await saveOrder(o);
  await notify(o.userId, '❌ Commande annulee', 'Votre commande n°'+o.orderNumber+' a ete annulee.');
  toast('Commande annulee','info');
  document.getElementById('admin-tab-content').innerHTML = adminOrders();
}

window._newImg = null;
function previewImg(input) {
  var f = input.files[0]; if (!f) return;
  var r = new FileReader();
  r.onload = function(e) {
    window._newImg = e.target.result;
    var prev = document.getElementById('pf-prev');
    if (prev) {
      if (prev.tagName === 'IMG') { prev.src = e.target.result; }
      else { prev.outerHTML = '<img id="pf-prev" src="'+e.target.result+'" style="width:100%;height:120px;object-fit:cover;border-radius:8px;margin-top:.5rem">'; }
    }
  };
  r.readAsDataURL(f);
}

    + '<button class="btn btn-secondary btn-full mt-1" onclick="closeModal(\'modal-product\')">Annuler</button></div></div>';
  var modal = document.getElementById('modal-product');
  modal.innerHTML = html; modal.style.display = 'block';
}

function getProdFormData() {
  return {name:document.getElementById('pf-name').value.trim(),category:document.getElementById('pf-cat').value,price:parseFloat(document.getElementById('pf-price').value)||0,description:document.getElementById('pf-desc').value.trim(),available:document.getElementById('pf-avail').checked,comingSoon:document.getElementById('pf-soon').checked};
}

async function saveNewProd() {
  var d = getProdFormData();
  if (!d.name) { toast('Nom requis','error'); return; }
  var newP = Object.assign({id:genId(),image:window._newImg||null}, d);
  await fbSaveDoc('products', newP.id, newP);
  _products = null;
  window._newImg = null;
  closeModal('modal-product');
  toast('Produit ajoute !','success');
  var html = await adminProductsRender();
  document.getElementById('admin-tab-content').innerHTML = html;
}

async function saveEditProd(id) {
  var d = getProdFormData();
  var products = await getProducts();
  var p = products.find(function(x){return x.id===id;});
  if (p) {
    var updated = Object.assign({}, p, d);
    if (window._newImg) updated.image = window._newImg;
    await fbSaveDoc('products', id, updated);
    _products = null;
  }
  window._newImg = null;
  closeModal('modal-product');
  toast('Produit modifie !','success');
  var html = await adminProductsRender();
  document.getElementById('admin-tab-content').innerHTML = html;
}

async function deleteProd(id) {
  if (!confirm('Supprimer ce produit ?')) return;
  var products = await getProducts();
  var filtered = products.filter(function(p){return p.id!==id;});
  _products = filtered;
  for (var p of filtered) { await fbSaveDoc('products', p.id, p); }
  var db = window.firebaseDB;
  var fns = window.firebaseFns;
  await fns.setDoc(fns.doc(db, 'products', id), {deleted:true}, {merge:true});
  _products = null;
  toast('Produit supprime','info');
  var html = await adminProductsRender();
  document.getElementById('admin-tab-content').innerHTML = html;
}

async function adminStats() {
  var allOrders = _orders;
  var done = allOrders.filter(function(o){return o.status==='picked_up';});
  var revenue = done.reduce(function(s,o){return s+o.total;},0);
  var avg = done.length ? revenue/done.length : 0;
  var users = await fbGetCollection('users');
  var clients = users.filter(function(u){return u.role!=='admin';});
  var freq = {};
  done.forEach(function(o){o.items.forEach(function(i){freq[i.name]=(freq[i.name]||0)+1;});});
  var sorted = Object.entries(freq).sort(function(a,b){return b[1]-a[1];}).slice(0,10);
  var html = '<div style="padding:0 1rem">'
    + '<h3 class="section-title mt-2">Statistiques</h3>'
    + '<div class="stat-grid">'
    + '<div class="stat-card"><div class="stat-value">'+fmt(revenue)+'</div><div class="stat-label">Chiffre d\'affaires</div></div>'
    + '<div class="stat-card"><div class="stat-value">'+done.length+'</div><div class="stat-label">Commandes livrees</div></div>'
    + '<div class="stat-card"><div class="stat-value">'+fmt(avg)+'</div><div class="stat-label">Panier moyen</div></div>'
    + '<div class="stat-card"><div class="stat-value">'+clients.length+'</div><div class="stat-label">Clients inscrits</div></div>'
    + '<div class="stat-card"><div class="stat-value">'+allOrders.filter(function(o){return ['pending','confirmed','preparing'].indexOf(o.status)>=0;}).length+'</div><div class="stat-label">En cours</div></div>'
    + '<div class="stat-card"><div class="stat-value">'+allOrders.filter(function(o){return o.status==='cancelled';}).length+'</div><div class="stat-label">Annulations</div></div>'
    + '</div>';
  if (sorted.length) {
    html += '<h3 class="section-title mt-1">Top produits</h3>';
    sorted.forEach(function(e,i){
      html += '<div style="display:flex;justify-content:space-between;align-items:center;padding:.6rem;background:var(--dark3);border-radius:8px;margin-bottom:.4rem">'
        + '<span class="text-sm fw-700">'+(i+1)+'. '+e[0]+'</span><span class="text-gold fw-700">'+e[1]+'</span></div>';
    });
  }
  html += '</div>';
  return html;
}

  clients.forEach(function(u){ html += '<option value="'+u.id+'">'+u.prenom+' ('+u.email+')</option>'; });
  html += '</select></div><div class="form-group"><label class="form-label">Expiration</label><input class="form-input" id="promo-exp" type="date"/></div>'
    + '<button class="btn btn-primary btn-sm btn-full" onclick="createPromo()">Envoyer l\'offre</button></div>'

async function savePtsCfg() {
  var cfg = await getCfg();
  cfg.signupBonusPoints = parseInt(document.getElementById('cfg-signup-pts').value)||50;
  cfg.pointsPerEuro = parseInt(document.getElementById('cfg-pts-euro').value)||10;
  await fbSaveDoc('config','main',cfg);
  _cfg = cfg;
  toast('Configuration sauvegardee','success');
}

async function createPromo() {
  var type = document.getElementById('promo-type').value;
  var title = document.getElementById('promo-title').value.trim();
  var desc = document.getElementById('promo-desc').value.trim();
  var target = document.getElementById('promo-target').value;
  var exp = document.getElementById('promo-exp').value;
  if (!title || !exp) { toast('Titre et expiration requis','error'); return; }
  var users = await fbGetCollection('users');
  var targets = target === 'all' ? users.filter(function(u){return u.role!=='admin';}) : users.filter(function(u){return u.id===target;});
  var cfg = await getCfg();
  for (var u of targets) {
    var expDate = type === 'birthday' ? new Date(Date.now()+(cfg.birthday_offer_days||30)*86400000).toISOString() : new Date(exp).toISOString();
    var promo = {id:genId(),userId:u.id,type,title,description:desc,expiresAt:expDate,used:false,createdAt:new Date().toISOString()};
    await fbSaveDoc('promos', promo.id, promo);
    await notify(u.id,'🎁 Nouvelle offre !',title+' — '+desc);
  }
  toast('Offre envoyee a '+targets.length+' client(s)','success');
}

async function adjPts(userId) {
  var pt = prompt('Ajuster les points (ex: +100 ou -50) :');
  if (!pt) return;
  var delta = parseInt(pt);
  if (isNaN(delta)) { toast('Valeur invalide','error'); return; }
  var u = await fbGetDoc('users', userId);
  if (!u) return;
  u.points = Math.max(0, (u.points||0)+delta);
  await saveUser(u);
  toast(u.prenom+' : '+u.points+' points','success');
  adminTab('fidelity', document.querySelector('.admin-nav-btn.active'));
}

function adminInvoices() {
  var orders = _orders.filter(function(o){return o.status!=='cancelled';});
  var html = '<div style="padding:0 1rem">'
    + '<div style="display:flex;justify-content:space-between;align-items:center;margin:1rem 0">'
    + '<h3 class="font-head fw-700">Factures ('+orders.length+')</h3>'

async function viewInvoice(id) {
  var o = _orders.find(function(x){return x.id===id;});

  var cfg = await getCfg();
  var itemsHTML = o.items.map(function(i){return '<tr><td>'+i.name+(i.details?' ('+i.details+')':'')+'</td><td style="text-align:right">'+fmt(i.price)+'</td></tr>';}).join('');
  var html = '<div class="modal-overlay" onclick="if(event.target===this)closeModal(\'modal-product\')">'
    + '<div class="modal"><div class="modal-handle"></div><h2 class="modal-title">Facture N°'+o.orderNumber+'</h2>'
    + '<div class="card" style="background:var(--dark3)">'
    + '<div class="fw-700 mb-1">Break Antillais</div><div class="text-sm text-muted">'+cfg.pickupAddress+'</div>'
    + '<div style="height:1px;background:var(--border);margin:.75rem 0"></div>'
    + '<div style="display:flex;justify-content:space-between;margin-bottom:.25rem"><span class="text-sm text-muted">Client</span><span class="text-sm">'+o.userPrenom+' · '+o.userPhone+'</span></div>'
    + '<div style="display:flex;justify-content:space-between;margin-bottom:.25rem"><span class="text-sm text-muted">Date</span><span class="text-sm">'+new Date(o.createdAt).toLocaleString('fr-FR')+'</span></div>'
    + '<div style="display:flex;justify-content:space-between;margin-bottom:.25rem"><span class="text-sm text-muted">Retrait</span><span class="text-sm">'+o.pickupTime+'</span></div>'
    + '<div style="height:1px;background:var(--border);margin:.75rem 0"></div>'
    + '<table style="width:100%;font-size:.85rem">'+itemsHTML+'</table>'
    + '<div style="height:1px;background:var(--border);margin:.75rem 0"></div>'
    + '<div style="display:flex;justify-content:space-between;font-weight:700"><span>TOTAL</span><span style="color:var(--gold)">'+fmt(o.total)+'</span></div>'
    + '<div class="text-sm text-muted mt-1">Reglement : '+o.payment+'</div></div>'
    + '<button class="btn btn-secondary btn-full mt-2" onclick="closeModal(\'modal-product\')">Fermer</button></div></div>';
  var modal = document.getElementById('modal-product');
  modal.innerHTML = html; modal.style.display = 'block';
}

function exportCSV() {
  var orders = _orders.filter(function(o){return o.status!=='cancelled';});
  var csv = 'N Facture,Date,Client,Telephone,Articles,Total,Reglement,Statut\n';
  orders.forEach(function(o){
    var items = o.items.map(function(i){return i.name;}).join(' | ');
    csv += o.orderNumber+',"'+new Date(o.createdAt).toLocaleString('fr-FR')+'","'+o.userPrenom+'","'+o.userPhone+'","'+items+'",'+o.total.toFixed(2)+',"'+o.payment+'","'+o.status+'"\n';
  });
  var blob = new Blob([csv],{type:'text/csv;charset=utf-8;'});
  var url = URL.createObjectURL(blob);
  var a = document.createElement('a');
  a.href = url; a.download = 'break-antillais-factures-'+new Date().toISOString().split('T')[0]+'.csv';
  document.body.appendChild(a); a.click(); document.body.removeChild(a); URL.revokeObjectURL(url);
  toast('Export telecharge','success');
}

  updateHeaderAuth();

  _cfg = DEFAULT_CFG;

  var ls = document.getElementById('loading-screen');
  if (ls) ls.style.display = 'none';
  var sh = document.getElementById('screen-home');
  if (sh) sh.style.display = 'block';

  subscribeOrders(function(orders) {

      document.getElementById('admin-tab-content').innerHTML = adminOrders();

    updateNavBadges();
  });
  subscribeConfig(function(cfg) {
    _cfg = cfg;
  });

};

// Hard timeout: show app after 4 seconds NO MATTER WHAT
setTimeout(function() {
  var ls = document.getElementById('loading-screen');
  if (ls && ls.style.display !== 'none') {
    _cfg = DEFAULT_CFG;
    _products = DEFAULT_PRODUCTS;
    ls.style.display = 'none';
    var sh = document.getElementById('screen-home');
    if (sh) sh.style.display = 'block';
    updateHeaderAuth();
    renderHomeScreen();
  }
}, 4000);
